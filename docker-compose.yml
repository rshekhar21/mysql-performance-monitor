services:
  app-db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: mysql_monitor
      MYSQL_USER: monitor_app
      MYSQL_PASSWORD: monitor_app_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - '3306:3306'
    volumes:
      - app-db-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-proot_password']
      interval: 10s
      timeout: 5s
      retries: 10

  test-mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: sample_app
      MYSQL_USER: monitor_user
      MYSQL_PASSWORD: monitor_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - '3307:3306'
    volumes:
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-proot_password']
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    ports:
      - '4000:4000'
    depends_on:
      app-db:
        condition: service_healthy

  collector:
    build:
      context: .
      dockerfile: apps/collector/Dockerfile
    env_file: .env
    ports:
      - '4100:4100'
    depends_on:
      app-db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4000
    ports:
      - '5173:80'
    depends_on:
      - api

volumes:
  app-db-data:
